name: Changelog
# Changelog and release management inspired by Changesets.
# https://github.com/whitphx/scriv-release
#
# 1. Pushes to `main` that include a changelog fragment under
#    `changelog.d/` open (or update) a "Changelog Preview" PR.
# 2. Merging that preview PR removes the fragments and triggers a
#    release: the action infers the bump level from the previous
#    revision's fragments and pushes a tag.

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run scriv-release
        uses: whitphx/scriv-release@591fbdc73d28e1fc559c92ead1e227f7aa05b2fa # v0.7.0
        with:
          client-id: ${{ vars.MY_CHANGESETS_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.MY_CHANGESETS_APP_PRIVATE_KEY }}
          preview-branch: scriv-preview
